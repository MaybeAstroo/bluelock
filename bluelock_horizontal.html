<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Lock – Horizontal Field</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');
  :root {
    --bg: #0a0a0f;
    --panel: #10101a;
    --border: #1e2a4a;
    --accent: #00d4ff;
    --danger: #ff3a3a;
    --gold: #ffd700;
    --green: #44ff88;
    --text: #c8d8f0;
    --dim: #4a5a7a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 10px 40px;
    gap: 14px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.6rem;
    letter-spacing: 8px;
    color: var(--accent);
    text-shadow: 0 0 30px #00d4ff44;
    margin-bottom: 0;
  }
  .sub { color: var(--dim); font-size: 0.58rem; letter-spacing: 4px; }

  /* ── FIELD ── */
  .field-wrap { display: flex; align-items: center; gap: 6px; }

  .goal-bar-v {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-size: 0.6rem; letter-spacing: 3px;
    padding: 10px 5px; border-radius: 3px;
    white-space: nowrap; height: 280px;
    display: flex; align-items: center; justify-content: center;
  }
  .goal-left  { background:#00d4ff18; border:1px solid var(--accent); color:var(--accent); transform:rotate(180deg); }
  .goal-right { background:#ff3a3a18; border:1px solid var(--danger); color:var(--danger); }

  .field {
    position: relative;
    width: 660px;
    height: 280px;
    background: #1a2e1a;
    border: 2px solid #3a6a3a;
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* grass stripes horizontal */
  .field::before {
    content:'';
    position:absolute; inset:0;
    background: repeating-linear-gradient(
      to right, transparent 0, transparent 72px,
      #1e341e 72px, #1e341e 144px
    );
  }
  /* grid lines */
  .field::after {
    content:'';
    position:absolute; inset:0;
    background:
      linear-gradient(to right,  transparent 33.3%, #2a4a2a 33.3%, #2a4a2a calc(33.3% + 1px), transparent calc(33.3% + 1px)),
      linear-gradient(to right,  transparent 66.6%, #2a4a2a 66.6%, #2a4a2a calc(66.6% + 1px), transparent calc(66.6% + 1px)),
      linear-gradient(to bottom, transparent 33.3%, #2a4a2a 33.3%, #2a4a2a calc(33.3% + 1px), transparent calc(33.3% + 1px)),
      linear-gradient(to bottom, transparent 66.6%, #2a4a2a 66.6%, #2a4a2a calc(66.6% + 1px), transparent calc(66.6% + 1px));
  }

  .center-circle {
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%);
    width:80px; height:80px; border-radius:50%;
    border:1px dashed #2a4a2a; pointer-events:none; z-index:1;
  }
  .center-dot {
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%);
    width:6px; height:6px; border-radius:50%;
    background:#2a4a2a; z-index:1;
  }

  /* goal boxes */
  .goal-box-left, .goal-box-right {
    position:absolute; top:50%; transform:translateY(-50%);
    width:28px; height:120px;
    border:1.5px dashed #3a6a3a; z-index:1;
    border-radius:2px;
  }
  .goal-box-left  { left:0; border-left:none; }
  .goal-box-right { right:0; border-right:none; }

  /* ── BALLS ── */
  .piece {
    position:absolute;
    width:40px; height:40px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    z-index:10;
    transform:translate(-50%,-50%);
    transition: left 0.5s cubic-bezier(.4,0,.2,1), top 0.5s cubic-bezier(.4,0,.2,1);
    filter: drop-shadow(0 2px 6px #000b);
    cursor:default;
  }
  .piece-inner {
    width:40px; height:40px; border-radius:50%;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    font-family:'Bebas Neue',sans-serif;
    font-size:6px; letter-spacing:0.5px;
    position:relative; overflow:hidden;
  }
  .piece-inner::after {
    content:'';
    position:absolute; inset:0; border-radius:50%;
    background:radial-gradient(circle at 33% 33%, rgba(255,255,255,0.22), transparent 60%);
    pointer-events:none;
  }
  .piece-label {
    position:absolute; top:-15px; left:50%; transform:translateX(-50%);
    font-size:6.5px; letter-spacing:0.5px;
    padding:1px 4px; border-radius:2px;
    background:#000c; white-space:nowrap;
  }

  .p-you     { background:radial-gradient(circle at 35% 35%,#00eeff,#006688); border:2.5px solid #00d4ff; }
  .p-tm1     { background:radial-gradient(circle at 35% 35%,#66ffaa,#008844); border:2px solid #44ff88; }
  .p-tm2     { background:radial-gradient(circle at 35% 35%,#55ee99,#007733); border:2px solid #44ff88; }
  .p-tm3     { background:radial-gradient(circle at 35% 35%,#77ffbb,#006622); border:2px solid #44ff88; }
  .p-striker { background:radial-gradient(circle at 35% 35%,#ff7766,#bb1100); border:2px solid #ff3a3a; }
  .p-mid     { background:radial-gradient(circle at 35% 35%,#ffee55,#bb9900); border:2px solid #ffd700; }
  .p-def     { background:radial-gradient(circle at 35% 35%,#aabbff,#3355aa); border:2px solid #88aaff; }

  .soccer-ball {
    position:absolute; width:14px; height:14px;
    z-index:20; pointer-events:none;
    transform:translate(-50%,-50%);
    transition: left 0.5s cubic-bezier(.4,0,.2,1), top 0.5s cubic-bezier(.4,0,.2,1);
    filter:drop-shadow(0 1px 3px #000a);
  }

  @keyframes shake { 0%,100%{transform:translate(-50%,-50%)} 25%{transform:translate(calc(-50% - 5px),-50%)} 75%{transform:translate(calc(-50% + 5px),-50%)} }
  @keyframes pop   { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.25)} }
  .shake { animation:shake 0.3s ease; }
  .pop   { animation:pop   0.3s ease; }

  .goal-flash {
    position:fixed; inset:0; z-index:999;
    display:flex; align-items:center; justify-content:center;
    pointer-events:none; opacity:0;
    font-family:'Bebas Neue',sans-serif;
    font-size:5rem; letter-spacing:10px;
    text-shadow:0 0 40px currentColor;
  }
  @keyframes gf { 0%,100%{opacity:0} 30%,70%{opacity:1} }
  .goal-flash.show { animation:gf 1.4s ease forwards; }

  /* ── BOTTOM UI ── */
  .bottom-ui {
    display:flex; gap:14px; flex-wrap:wrap;
    justify-content:center; width:100%; max-width:800px;
  }

  .panel {
    background:var(--panel); border:1px solid var(--border);
    border-radius:4px; padding:10px 14px;
  }
  .panel-title { font-size:0.58rem; color:var(--dim); letter-spacing:3px; margin-bottom:8px; }

  .score-row {
    font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:5px;
    display:flex; gap:10px; align-items:center;
  }
  .s-you   { color:var(--accent); }
  .s-sep   { color:var(--dim); font-size:1rem; }
  .s-enemy { color:var(--danger); }

  .turn-ind {
    font-family:'Bebas Neue',sans-serif; font-size:0.85rem; letter-spacing:3px;
    padding:5px 10px; border-radius:3px; text-align:center;
    transition:all 0.3s;
  }
  .t-you   { background:#00d4ff18; border:1px solid var(--accent); color:var(--accent); }
  .t-enemy { background:#ff3a3a18; border:1px solid var(--danger); color:var(--danger); }

  .log-box {
    height:90px; overflow-y:auto;
    font-size:0.64rem; line-height:1.9;
    min-width:220px;
  }
  .log-box .good    { color:var(--accent); }
  .log-box .bad     { color:var(--danger); }
  .log-box .neutral { color:var(--gold); }
  .log-box .sys     { color:var(--dim); }

  .btn-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; min-width:190px; }
  .btn {
    background:transparent; border:1px solid var(--border);
    color:var(--text); font-family:'Share Tech Mono',monospace;
    font-size:0.6rem; letter-spacing:1px;
    padding:7px 4px; cursor:pointer; border-radius:3px;
    text-transform:uppercase; transition:all 0.15s;
  }
  .btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); background:#00d4ff11; }
  .btn:disabled { opacity:0.25; cursor:not-allowed; }
  .btn.red { border-color:#ff3a3a44; color:var(--danger); }
  .btn.red:hover:not(:disabled) { background:#ff3a3a11; border-color:var(--danger); }
  .btn.full { grid-column:span 2; }

  .legend-grid { display:grid; grid-template-columns:1fr 1fr; gap:3px 12px; font-size:0.6rem; }
  .leg-row { display:flex; align-items:center; gap:6px; }
  .leg-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
</style>
</head>
<body>

<h1>BLUE LOCK</h1>
<p class="sub">HORIZONTAL FIELD — FULL AUTONOMOUS AI</p>

<div class="goal-flash" id="gf"></div>

<!-- FIELD -->
<div class="field-wrap">
  <div class="goal-bar-v goal-left">YOUR GOAL ◀</div>
  <div class="field" id="field">
    <div class="center-circle"></div>
    <div class="center-dot"></div>
    <div class="goal-box-left"></div>
    <div class="goal-box-right"></div>
  </div>
  <div class="goal-bar-v goal-right">▶ ENEMY GOAL</div>
</div>

<!-- BOTTOM UI -->
<div class="bottom-ui">

  <div class="panel" style="display:flex;flex-direction:column;gap:8px;min-width:130px;">
    <div class="panel-title">— SCORE —</div>
    <div class="score-row">
      <span class="s-you"><span id="sYou">0</span></span>
      <span class="s-sep">–</span>
      <span class="s-enemy"><span id="sEnemy">0</span></span>
    </div>
    <div class="turn-ind t-you" id="turnInd">YOUR TURN</div>
  </div>

  <div class="panel">
    <div class="panel-title">— MATCH LOG —</div>
    <div class="log-box" id="log">
      <span class="sys">// Kick off.</span><br>
      <span class="neutral">You have the ball.</span>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">— YOUR ACTIONS —</div>
    <div class="btn-grid">
      <button class="btn" id="bUp"      onclick="playerMove('up')">▲ Up</button>
      <button class="btn" id="bDown"    onclick="playerMove('down')">▼ Down</button>
      <button class="btn" id="bDribble" onclick="playerAct('dribble')">🏃 Dribble</button>
      <button class="btn" id="bPass"    onclick="playerAct('pass')">↗ Pass</button>
      <button class="btn red full" id="bShoot" onclick="playerAct('shoot')">🔥 SHOOT</button>
      <button class="btn full" id="bPress" style="display:none" onclick="playerAct('press')">🫷 Press</button>
      <button class="btn full" id="bHold"  style="display:none" onclick="playerAct('hold')">🧱 Hold</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">— LEGEND —</div>
    <div class="legend-grid">
      <div class="leg-row"><div class="leg-dot" style="background:#00d4ff"></div>YOU</div>
      <div class="leg-row"><div class="leg-dot" style="background:#44ff88"></div>TEAMMATES</div>
      <div class="leg-row"><div class="leg-dot" style="background:#ff3a3a"></div>STRIKER</div>
      <div class="leg-row"><div class="leg-dot" style="background:#ffd700"></div>MIDFIELDER</div>
      <div class="leg-row"><div class="leg-dot" style="background:#88aaff"></div>DEFENDER</div>
      <div class="leg-row"><div class="leg-dot" style="background:white;border:1px solid #aaa"></div>BALL</div>
    </div>
  </div>

</div>

<script>
// ── FIELD DIMENSIONS ──
// Horizontal: cols = left→right (attack direction = higher col)
// 3 cols, 3 rows. Col 1 = your goal side, Col 3 = enemy goal side
const FW = 660, FH = 280;
const COLS = 3, ROWS = 3;
const CW = FW / COLS, CH = FH / ROWS;

function cellXY(row, col) {
  return {
    x: (col - 1) * CW + CW / 2,
    y: (row - 1) * CH + CH / 2
  };
}

// Small offsets so balls in same cell don't overlap
const OFF = {
  you:     { dx:  0,  dy:  0  },
  tm1:     { dx:  0,  dy: -13 },
  tm2:     { dx: -13, dy:  10 },
  tm3:     { dx:  13, dy:  10 },
  striker: { dx:  0,  dy:  0  },
  mid:     { dx: -13, dy:  0  },
  def:     { dx:  13, dy:  0  },
};

// ── STATE ──
let G = {
  // row 1-3 (top→bottom), col 1-3 (left=your goal → right=enemy goal)
  you:     { row: 2, col: 1 },
  tm1:     { row: 1, col: 1 },
  tm2:     { row: 3, col: 1 },
  tm3:     { row: 2, col: 2 },
  striker: { row: 2, col: 3 },
  mid:     { row: 2, col: 2 },
  def:     { row: 2, col: 3 },

  hasBall: 'you',
  scoreYou: 0, scoreEnemy: 0,

  yourDribble: 50, yourShoot: 55, yourDefense: 50,
  strikerShoot: 75 + ri(0,15), strikerDribble: 15 + ri(0,10),
  midDribble: 55, midDefense: 55,
  defDefense: 88, defDribble: 20,

  busy: false,
  aiTick: null
};

function ri(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

// ── BUILD DOM ──
const PCFG = {
  you:     { cls:'p-you',     label:'YOU',      color:'#00d4ff' },
  tm1:     { cls:'p-tm1',     label:'TM1',      color:'#44ff88' },
  tm2:     { cls:'p-tm2',     label:'TM2',      color:'#44ff88' },
  tm3:     { cls:'p-tm3',     label:'TM3',      color:'#44ff88' },
  striker: { cls:'p-striker', label:'STRIKER',  color:'#ff3a3a' },
  mid:     { cls:'p-mid',     label:'MID',      color:'#ffd700' },
  def:     { cls:'p-def',     label:'DEF',      color:'#88aaff' },
};

function buildDOM() {
  const field = document.getElementById('field');
  Object.entries(PCFG).forEach(([id, cfg]) => {
    const el = document.createElement('div');
    el.className = 'piece';
    el.id = 'pc-' + id;
    const txtColor = cfg.color === '#ffd700' ? '#111' : 'rgba(255,255,255,0.9)';
    el.innerHTML = `
      <div class="piece-inner ${cfg.cls}">
        <span style="color:${txtColor}">${cfg.label}</span>
      </div>
      <div class="piece-label" style="color:${cfg.color}">${cfg.label}</div>`;
    field.appendChild(el);
  });

  const ball = document.createElement('div');
  ball.id = 'sball';
  ball.className = 'soccer-ball';
  ball.innerHTML = `<svg viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">
    <circle cx="7" cy="7" r="6.5" fill="white" stroke="#bbb" stroke-width="0.5"/>
    <polygon points="7,1.5 4.5,5.5 9.5,5.5" fill="#222"/>
    <polygon points="2.5,9 7,12 11.5,9 9.5,5.5 4.5,5.5" fill="#444" stroke="white" stroke-width="0.3"/>
  </svg>`;
  field.appendChild(ball);
}

function place(id) {
  const el = document.getElementById('pc-' + id);
  const pos = G[id];
  const off = OFF[id] || { dx:0, dy:0 };
  const p = cellXY(pos.row, pos.col);
  el.style.left = (p.x + off.dx) + 'px';
  el.style.top  = (p.y + off.dy) + 'px';
}

function placeAll() {
  Object.keys(PCFG).forEach(place);
  // ball
  const hid = G.hasBall;
  const hpos = G[hid];
  const hoff = OFF[hid] || { dx:0, dy:0 };
  const p = cellXY(hpos.row, hpos.col);
  const b = document.getElementById('sball');
  b.style.left = (p.x + hoff.dx + 14) + 'px';
  b.style.top  = (p.y + hoff.dy + 14) + 'px';

  document.getElementById('sYou').textContent   = G.scoreYou;
  document.getElementById('sEnemy').textContent = G.scoreEnemy;
}

function anim(id, cls) {
  const el = document.getElementById('pc-' + id);
  el.classList.remove(cls);
  void el.offsetWidth;
  el.classList.add(cls);
  setTimeout(() => el.classList.remove(cls), 400);
}

// ── LOG ──
function log(msg, cls='neutral') {
  const box = document.getElementById('log');
  box.innerHTML += `<br><span class="${cls}">${msg}</span>`;
  box.scrollTop = box.scrollHeight;
}

// ── GOAL FLASH ──
function flashGoal(txt, color) {
  const el = document.getElementById('gf');
  el.textContent = txt; el.style.color = color;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

// ── UI BUTTONS ──
function setAllBtns(dis) { document.querySelectorAll('.btn').forEach(b => b.disabled = dis); }

function setTurnUI(whose) {
  const ind = document.getElementById('turnInd');
  const hasBall = G.hasBall === 'you';

  const bDribble = document.getElementById('bDribble');
  const bPass    = document.getElementById('bPass');
  const bShoot   = document.getElementById('bShoot');
  const bPress   = document.getElementById('bPress');
  const bHold    = document.getElementById('bHold');
  const bUp      = document.getElementById('bUp');
  const bDown    = document.getElementById('bDown');

  if (whose === 'you') {
    ind.textContent = 'YOUR TURN';
    ind.className = 'turn-ind t-you';
    setAllBtns(false);
    if (hasBall) {
      bDribble.style.display = ''; bPass.style.display = ''; bShoot.style.display = '';
      bPress.style.display = 'none'; bHold.style.display = 'none';
    } else {
      bDribble.style.display = 'none'; bPass.style.display = 'none'; bShoot.style.display = 'none';
      bPress.style.display = ''; bHold.style.display = '';
      bUp.disabled = true; bDown.disabled = true;
    }
  } else {
    ind.textContent = 'ENEMY TURN';
    ind.className = 'turn-ind t-enemy';
    setAllBtns(true);
  }
}

// ── RESET ──
function resetPos() {
  G.you     = { row:2, col:1 };
  G.tm1     = { row:1, col:1 };
  G.tm2     = { row:3, col:1 };
  G.tm3     = { row:2, col:2 };
  G.striker = { row:2, col:3 };
  G.mid     = { row:2, col:2 };
  G.def     = { row:2, col:3 };
}

// ── CLAMP ──
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

// ── PLAYER INPUT ──
function playerMove(dir) {
  if (G.busy) return;
  if (dir === 'up'   && G.you.row > 1) { G.you.row--; log('You move up.', 'sys'); }
  else if (dir === 'down' && G.you.row < 3) { G.you.row++; log('You move down.', 'sys'); }
  else { log("Edge of field!", 'sys'); return; }
  placeAll();
  // teammates react
  tmReact();
}

function playerAct(type) {
  if (G.busy) return;
  G.busy = true; setAllBtns(true);

  if (type === 'dribble') {
    const adj = adjacentEnemies();
    const roll = ri(1,100);
    if (adj.includes('def')) {
      if (roll + G.yourDribble - G.defDefense > 50) { log('Past the DEFENDER! 💨','good'); anim('you','pop'); G.you.col = clamp(G.you.col+1,1,3); placeAll(); done(); }
      else { log('Defender strips you! 😤','bad'); anim('you','shake'); loseBall(); }
    } else if (adj.includes('striker')) {
      if (roll + G.yourDribble - G.strikerDribble > 50) { log('Past the striker! 💨','good'); anim('you','pop'); G.you.col = clamp(G.you.col+1,1,3); placeAll(); done(); }
      else { log('Striker wins it!','bad'); anim('you','shake'); G.hasBall='striker'; placeAll(); setTimeout(enemyTurn,600); }
    } else if (adj.includes('mid')) {
      if (roll + G.yourDribble - G.midDribble > 50) { log('Through the midfield!','good'); anim('you','pop'); G.you.col = clamp(G.you.col+1,1,3); placeAll(); done(); }
      else { log('Midfielder intercepts!','bad'); anim('you','shake'); G.hasBall='mid'; placeAll(); setTimeout(enemyTurn,600); }
    } else {
      if (roll > 25) { log('Clean run forward.','good'); anim('you','pop'); G.you.col = clamp(G.you.col+1,1,3); placeAll(); done(); }
      else { log('Lost the ball!','bad'); anim('you','shake'); loseBall(); }
    }
  }

  else if (type === 'pass') {
    const tms = ['tm1','tm2','tm3'];
    let best=null, bd=99;
    tms.forEach(t => { const d=dist(G[t],G.you); if(d<bd){bd=d;best=t;} });
    const midInLane = G.mid.col >= G.you.col && G.mid.col <= G[best].col;
    const roll = ri(1,100);
    if (roll > (midInLane ? 50 : 30)) {
      log(`Pass to ${best.toUpperCase()}! 🟢`,'good');
      anim(best,'pop'); G.hasBall = best; placeAll(); done();
    } else {
      log('Pass cut out by midfielder!','bad');
      G.hasBall='mid'; placeAll(); setTimeout(enemyTurn,600);
    }
  }

  else if (type === 'shoot') {
    if (G.you.col === 3) {
      const roll = ri(1,100);
      if (roll + G.yourShoot > 110) {
        log('🔥 GOOOAL! YOU SCORE!','good');
        anim('you','pop'); flashGoal('GOAL!','#00d4ff');
        G.scoreYou++; G.hasBall='striker';
        resetPos(); placeAll();
        setTimeout(() => { G.busy=false; setTurnUI('enemy'); setTimeout(enemyTurn,800); }, 1500);
      } else {
        log('Shot saved! 😩','bad'); anim('you','shake');
        G.hasBall='striker'; placeAll(); setTimeout(enemyTurn,600);
      }
    } else {
      log('Too far! Dribble to column 3.','sys');
      done();
    }
  }

  else if (type === 'press') {
    const roll = ri(1,100);
    if (roll + G.yourDefense > 100) { log('Won it back! 💪','good'); anim('you','pop'); G.hasBall='you'; placeAll(); done(); }
    else { log('Press failed.','bad'); setTimeout(enemyTurn,500); }
  }

  else if (type === 'hold') {
    log('Holding shape.','sys');
    setTimeout(enemyTurn,500);
  }
}

function done() { G.busy=false; setTurnUI('you'); }

function loseBall() {
  const enemies=['striker','mid','def'];
  G.hasBall = enemies[ri(0,2)];
  placeAll();
  setTimeout(enemyTurn,700);
}

function adjacentEnemies() {
  const res=[];
  ['striker','mid','def'].forEach(e => {
    if (Math.abs(G[e].row-G.you.row)<=1 && Math.abs(G[e].col-G.you.col)<=1) res.push(e);
  });
  return res;
}

function dist(a,b) { return Math.abs(a.row-b.row)+Math.abs(a.col-b.col); }

// ── TEAMMATES AUTONOMOUS AI ──
function tmReact() {
  // tm1 pushes forward on the top lane
  if (G.hasBall==='you' || G.hasBall==='tm1'||G.hasBall==='tm2'||G.hasBall==='tm3') {
    // tm1 advances to create an option
    if (G.tm1.col < 3 && G.tm1.col <= G.you.col+1) G.tm1.col = clamp(G.tm1.col+1,1,3);
    // tm2 mirrors bottom lane
    if (G.tm2.col < 3 && G.tm2.col <= G.you.col+1) G.tm2.col = clamp(G.tm2.col+1,1,3);
    // tm3 supports the ball carrier
    const target = G[G.hasBall];
    if (G.tm3.col < target.col) G.tm3.col++;
    else if (G.tm3.col > target.col && G.tm3.col>1) G.tm3.col--;
    if (G.tm3.row < target.row) G.tm3.row++;
    else if (G.tm3.row > target.row) G.tm3.row--;
  } else {
    // when losing possession teammates fall back
    G.tm1.col = clamp(G.tm1.col-1,1,3);
    G.tm2.col = clamp(G.tm2.col-1,1,3);
    G.tm3.col = clamp(G.tm3.col-1,1,3);
  }
  placeAll();
}

// ── ENEMY AUTONOMOUS AI ──
function enemyTurn() {
  setTurnUI('enemy');
  G.busy = true;

  const holder = G.hasBall;
  const isEnemy = ['striker','mid','def'].includes(holder);

  if (isEnemy) {
    runEnemyAttack(holder, 0);
  } else {
    runEnemyPress();
  }
}

function runEnemyAttack(holder, step) {
  if (step > 5) { G.busy=false; setTurnUI('you'); return; }

  const pos = G[holder];

  // SHOOT if at col 1 (your goal side)
  if (pos.col <= 1) {
    const roll = ri(1,100);
    const pwr  = holder==='striker' ? G.strikerShoot : holder==='mid' ? 55 : 15;
    log(`⚡ ${holder.toUpperCase()} SHOOTS!`,'neutral');
    setTimeout(() => {
      if (roll + pwr > 120) {
        log(`💀 ENEMY SCORES! ${holder.toUpperCase()} finishes!`,'bad');
        anim(holder,'pop'); flashGoal('ENEMY GOAL!','#ff3a3a');
        G.scoreEnemy++; G.hasBall='you';
        resetPos(); placeAll();
        setTimeout(() => { G.busy=false; setTurnUI('you'); }, 1500);
      } else {
        log('Shot blocked! You recover.','good');
        anim(holder,'shake'); G.hasBall='you';
        placeAll(); G.busy=false; setTurnUI('you');
      }
    }, 500);
    return;
  }

  // PASS between enemies if teammate is closer to goal
  const enemies = ['striker','mid','def'].filter(e=>e!==holder);
  const closer = enemies.find(e => G[e].col < pos.col);
  if (closer && ri(1,100) > 55) {
    log(`${holder.toUpperCase()} passes to ${closer.toUpperCase()}.`,'neutral');
    G.hasBall = closer;
    placeAll();
    setTimeout(() => runEnemyAttack(closer, step+1), 650);
    return;
  }

  // ADVANCE toward your goal (decrease col)
  log(`${holder.toUpperCase()} drives forward.`,'sys');
  pos.col = clamp(pos.col-1, 1, 3);

  // try to track toward ball-carrier row
  const tmClose = ['tm1','tm2','tm3'].find(t => G[t].row===pos.row && G[t].col===pos.col);
  if (tmClose) {
    // try to go around
    pos.row = pos.row === 2 ? (ri(0,1)===0?1:3) : 2;
  }

  // other enemies support: mid tracks striker col, def holds back
  if (holder==='striker') {
    G.mid.col = clamp(G.mid.col-1, 1, 3);
    if (G.mid.row !== G.striker.row) G.mid.row += G.mid.row < G.striker.row ? 1 : -1;
  }
  if (holder==='mid') {
    G.striker.col = clamp(G.striker.col-1, 1, 3);
  }
  // def always pushes up slightly
  if (holder!=='def') G.def.col = clamp(G.def.col-1, 2, 3);

  placeAll();
  setTimeout(() => runEnemyAttack(holder, step+1), 700);
}

function runEnemyPress() {
  // Enemies don't have ball — they press toward you
  log('Enemies press...','sys');

  // Striker closes on you aggressively
  if (G.striker.col > G.you.col) G.striker.col--;
  else if (G.striker.col < G.you.col) G.striker.col++;
  if (G.striker.row !== G.you.row) G.striker.row += G.striker.row < G.you.row ? 1 : -1;

  // Midfielder covers center lane
  if (G.mid.col !== 2) G.mid.col += G.mid.col < 2 ? 1 : -1;
  if (G.mid.row !== G.you.row) G.mid.row += G.mid.row < G.you.row ? 1 : -1;

  // Defender stays back but shifts row toward threat
  if (G.def.col < 3) G.def.col++;
  if (G.def.row !== G.you.row) G.def.row += G.def.row < G.you.row ? 1 : -1;

  placeAll();
  tmReact();

  setTimeout(() => { G.busy=false; setTurnUI('you'); }, 500);
}

// ── INIT ──
buildDOM();
placeAll();
setTurnUI('you');
</script>
